name: Build containers:release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: server
            dockerfile: docker/server.Dockerfile
            image: ghcr.io/arairon/ssau-schedule-server
          - service: bot
            dockerfile: docker/bot.Dockerfile
            image: ghcr.io/arairon/ssau-schedule-bot
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: "{{defaultContext}}"
          file: ${{ matrix.dockerfile }}
          push: true
          cache-from: |
            type=gha,scope=${{ matrix.service }}-main
            type=gha,scope=${{ matrix.service }}-release
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-release
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.ref_name }}
