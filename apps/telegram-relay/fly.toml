app = "ssau-schedule-telegram-relay"
primary_region = "waw"

[env]
NODE_ENV = "production"
RELAY_HOST = "0.0.0.0"
RELAY_PORT = "3020"

[processes]
app = "bun run src/index.ts"

[http_service]
internal_port = 3020
force_https = true
auto_start_machines = true
auto_stop_machines = "stop"
min_machines_running = 0
processes = ["app"]

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/healthz"

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
